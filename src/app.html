<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />

		<!-- Google Fonts: Bebas Neue (display), DM Sans (body), DM Mono (code) -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap"
			rel="stylesheet"
		/>

		<!-- Theme init — prevents FOUC (flash of wrong theme) -->
		<script>
			(function () {
				const key = 'latent-line-theme';
				const stored = localStorage.getItem(key);
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const theme = stored ? stored : prefersDark ? 'dark' : 'light';
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
